<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Các hình tạo được với Border</title>
    <style>
        .hinh-vuong {
            width: 60px;
            height: 60px;
            border-width: 2px;
            border-style: solid;
            border-color: #d9534f;
            margin: 20px;
        }
        .hinh-chu-nhat {
            width: 100px;
            height: 50px;
            border-width: 2px;
            border-style: solid;
            border-color: #337ab7;
            margin: 20px;
        }
        .tam-giac-len {
            width: 0;
            height: 0;
            border-width: 0 35px 60px 35px;
            border-style: solid;
            border-color: transparent transparent #5cb85c transparent;
            margin: 20px;
        }
        .tam-giac-xuong {
            width: 0;
            height: 0;
            border-width: 60px 35px 0 35px;
            border-style: solid;
            border-color: #f0ad4e transparent transparent transparent;
            margin: 20px;
        }
        .tam-giac-trai {
            width: 0;
            height: 0;
            border-width: 30px 60px 30px 0;
            border-style: solid;
            border-color: transparent #9b59b6 transparent transparent;
            margin: 20px;
        }
        .tam-giac-phai {
            width: 0;
            height: 0;
            border-width: 30px 0 30px 60px;
            border-style: solid;
            border-color: transparent transparent transparent #e67e22;
            margin: 20px;
        }
        .hinh-thang {
            width: 50px;
            height: 0;
            border-width: 0 20px 50px 20px;
            border-style: solid;
            border-color: transparent transparent #1abc9c transparent;
            margin: 20px;
        }
        .tam-giac-rong {
            width: 0;
            height: 0;
            border-width: 0 60px 35px 60px;
            border-style: solid;
            border-color: transparent transparent #34495e transparent;
            margin: 20px;
        }
        .tam-giac-nhon {
            width: 0;
            height: 0;
            border-width: 0 20px 80px 20px;
            border-style: solid;
            border-color: transparent transparent #c0392b transparent;
            margin: 20px;
        }
        .tam-giac-can {
            width: 0;
            height: 0;
            border-width: 0 35px 50px 35px;
            border-style: solid;
            border-color: transparent transparent #d35400 transparent;
            margin: 20px;
        }
        .mui-ten-phai {
            width: 0;
            height: 0;
            border-width: 25px 0 25px 50px;
            border-style: solid;
            border-color: transparent transparent transparent #16a085;
            margin: 20px;
        }
        .mui-ten-trai {
            width: 0;
            height: 0;
            border-width: 25px 50px 25px 0;
            border-style: solid;
            border-color: transparent #8e44ad transparent transparent;
            margin: 20px;
        }
        .ribbon {
            width: 50px;
            height: 0;
            border-width: 25px 25px 25px 0;
            border-style: solid;
            border-color: #e74c3c transparent #e74c3c #e74c3c;
            margin: 20px;
        }
        .f8-container {
            margin: 40px 20px;
        }
        .chu-f, .so-8 {
            display: inline-block; 
        }
        .chu-f {
            margin-right: 15px; 
        }
        .f-top {
            width: 66px;
            height: 40px;
            border-width: 26px 0 0 26px;
            border-style: solid;
            border-color: #dd4b39 transparent transparent #dd4b39;
        }
        .f-bottom {
            width: 66px;
            height: 72px;
            border-width: 26px 0 0 26px;
            border-style: solid;
            border-color: #dd4b39 transparent transparent #dd4b39;
        }
        .eight-top {
            width: 40px;
            height: 40px;
            border-width: 26px 26px 13px 26px;
            border-style: solid;
            border-color: #dd4b39;
        }
        .eight-bottom {
            width: 40px;
            height: 46px;
            border-width: 13px 26px 26px 26px;
            border-style: solid;
            border-color: #dd4b39;
        }
    </style>
</head>
<body>
    <div class="hinh-vuong"></div>
    <div class="hinh-chu-nhat"></div>
    <div class="tam-giac-len"></div>
    <div class="tam-giac-xuong"></div>
    <div class="tam-giac-trai"></div>
    <div class="tam-giac-phai"></div>
    <div class="hinh-thang"></div>
    <div class="tam-giac-rong"></div>
    <div class="tam-giac-nhon"></div>
    <div class="tam-giac-can"></div>
    <div class="mui-ten-phai"></div>
    <div class="mui-ten-trai"></div>
    <div class="ribbon"></div>
    <div class="f8-container">
        <div class="chu-f">
            <div class="f-top"></div>
            <div class="f-bottom"></div>
        </div>
        <div class="so-8">
            <div class="eight-top"></div>
            <div class="eight-bottom"></div>
        </div>
    </div>
</body>
</html>
